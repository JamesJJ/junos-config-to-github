name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Set tag
        id: tag
        run: |
          TAG="v0.$(date -u +'%Y%m%d.%H%M%S')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          LDFLAGS="-X main.version=${{ steps.tag.outputs.tag }}"
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o junos-config-to-github-linux-amd64
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o junos-config-to-github-linux-arm64

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes \
            junos-config-to-github-linux-amd64 \
            junos-config-to-github-linux-arm64
